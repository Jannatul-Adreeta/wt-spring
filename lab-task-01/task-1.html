<!DOCTYPE html>

<html>

<head><title>

    AIUB admission

</title></head>




<body>


    


 

<h1>AIUB Admission Registration Form Page</h1>
<p> <i>Please upload all mentioned Credentials</i> </p>

<fieldset>
    <legend>Personal Information:</legend>

<form>

    <table>

        <tr>

            <td>First Name: </td>

            <td> <input type="text"> </td>

        </tr>

        <tr>

            <td>Last Name: </td>

            <td> <input type="text"> </td>

        </tr>

        <tr>

            <td>Email Address: </td>

            <td><input type="email">  </td>

        </tr>

         <tr>

            <td>Ethnicity: </td>

            <td><input type="checkbox" id="Ethnicity" name="Ethnicity" value="Bangladeshi"> Bangladeshi <input type="checkbox" id="Ethnicity1" name="Ethnicity1" value="Others"> Others </td>

        </tr>

        <tr>

            <td>Gender: </td>

            <td> <input type="radio",name="Gender" , value="Male"> Male 
            <input type="radio", name="Gender", value="Female"> Female </td>

        </tr> 

      
        <tr>

            <td>Date of Birth: </td>

            <td> <input type="date"></td>

        </tr>

         <tr>

            <td>Credentials: </td>

            <td> <input type="file"></td>

        </tr>

         <tr>

            <td>Photo:</td>
            <td><input type="file"  required> </td>

        </tr>

        <tr>
            <td>
                <label for="Department">Department:</label>

                <select name="Department" id="Department">
                <option value="EEE">EEE</option>
                <option value="CSE">CSE</option>
                <option value="COE">COE</option>
                <option value="BBA">BBA</option>
                </select>

            </td>
        </tr>
        
            
       

        <tr>

            <td> <input type="submit"> </td>

        </tr>



    </table>

    </fieldset>

</form>

 

</body>

</html>
